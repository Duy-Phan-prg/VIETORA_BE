spring.application.name=vietora-be
server.port=8080


spring.datasource.url=jdbc:mysql://localhost:3306/vietora_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=vietora-super-secret-key-change-in-production-min-256-bits
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

app.cors.allowed-origins=http://localhost:5173
app.ai-service.url=http://localhost:8000

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@vietora.com
app.base-url=http://localhost:5173

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
